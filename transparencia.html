<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparência | Ministério RCC</title>
    
    <link rel="icon" type="image/png" href="trelogo.png">
    <link rel="apple-touch-icon" href="trelogo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { tre: { brand: '#D31522', brandHover: '#FA1C2A', bgPanel: 'rgba(20, 4, 5, 0.5)', glassNav: 'rgba(25, 3, 4, 0.85)' } },
                    boxShadow: { '3xl': '0 35px 60px -15px rgba(0, 0, 0, 0.5)', 'nav': '0 10px 40px -10px rgba(0, 0, 0, 0.7)' }
                }
            }
        }
    </script>

    <style>
        body { background: #0A0102; background-image: radial-gradient(circle at top center, #35060A 0%, #0A0102 90%); color: #FFFFFF; min-height: 100vh; background-attachment: fixed; overflow-x: hidden; }
        .glass-navbar { background: theme('colors.tre.glassNav'); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        .glass-panel-simple { background: rgba(20, 4, 5, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-input { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s ease; }
        .glass-input:focus { border-color: theme('colors.tre.brand'); outline: none; box-shadow: 0 0 15px rgba(211, 21, 34, 0.2); }
        .point-badge { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 11px; padding: 3px 8px; border-radius: 4px; }
        .point-emerald { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); }
        .point-red { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #D31522; border-radius: 3px; }
    </style>
</head>
<body class="antialiased flex flex-col">

    <header class="sticky top-0 z-50 w-full glass-navbar shadow-nav opacity-0" id="anim-header">
        <div class="container mx-auto px-4 md:px-6 h-16 md:h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center hover:opacity-80 transition-opacity">
                <img src="trelogo.png" alt="Logo" class="h-8 md:h-12 object-contain">
            </a>
            <a href="index.html" class="bg-white/5 hover:bg-white/10 border border-white/10 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Voltar ao Início
            </a>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 md:px-6 py-10 opacity-0" id="anim-content">
        <div class="mb-10 text-center md:text-left pb-6 border-b border-white/5">
            <h1 class="text-3xl md:text-5xl font-black tracking-tight text-white uppercase mb-2 flex items-center justify-center md:justify-start gap-4">
                <i class="fa-solid fa-magnifying-glass-chart text-emerald-500"></i> Portal de Transparência
            </h1>
            <p class="text-white/40 text-xs md:text-sm">Histórico público e auditável de todas as postagens julgadas pela Liderança.</p>
        </div>

        <div class="glass-panel-simple p-5 flex flex-wrap items-center justify-between gap-4 mb-8 rounded-xl border border-white/5 relative z-[100]">
            <div class="relative">
                <button id="btn-filter-mes" onclick="toggleDropdown()" class="glass-panel-simple !bg-white/5 px-5 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2 text-white cursor-pointer hover:text-white transition-colors border border-white/10">
                    <i class="fa-solid fa-calendar-alt text-amber-500"></i> 
                    <span id="texto-filter-mes">Carregando...</span> 
                    <i id="icone-filter-seta" class="fa-solid fa-chevron-down text-xs ml-1 text-white/40 transition-transform duration-300"></i>
                </button>
                <div id="menu-filter-meses" class="absolute left-0 top-full mt-2 w-56 glass-panel-simple !bg-[#0A0102]/95 rounded-lg opacity-0 invisible translate-y-2 transition-all duration-300 overflow-hidden flex flex-col text-sm shadow-2xl border border-white/10 max-h-64 overflow-y-auto custom-scrollbar">
                    </div>
            </div>

            <div class="relative w-full md:w-80">
                <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-white/40"></i>
                <input type="text" id="search-input" onkeyup="filtrarTabela()" placeholder="Buscar Nick do Policial..." class="w-full glass-input rounded-lg pl-11 pr-4 py-3 text-sm font-medium">
            </div>
        </div>

        <div class="glass-panel-simple rounded-2xl overflow-hidden p-1 shadow-3xl relative z-10 border border-white/5">
            <div class="overflow-x-auto pb-2">
                <table class="w-full text-left border-collapse min-w-full text-sm">
                    <thead class="bg-white/5 text-[10px] uppercase font-black tracking-widest text-white/40 border-b border-white/5">
                        <tr>
                            <th class="p-4 px-6">Nick</th>
                            <th class="p-4">Atividade Avaliada</th>
                            <th class="p-4 text-center">Pontos</th>
                            <th class="p-4 text-center">Status</th>
                            <th class="p-4">Julgado Por</th>
                            <th class="p-4">Data Julgamento</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="6" class="p-10 text-center text-white/30"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Sincronizando Banco de Dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-center mt-4 glass-panel-simple rounded-2xl border-dashed border-2 border-white/5">
            <i class="fa-solid fa-folder-open text-4xl text-white/20 mb-4"></i>
            <h3 class="text-lg font-bold text-white/50">Nenhum registro encontrado</h3>
            <p class="text-sm text-white/30 mt-1">Nenhuma atividade julgada para este mês.</p>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCJqoHClBg9c6SuRlbFO2YxYTdpxGsDEe0", authDomain: "tre-ranking.firebaseapp.com", projectId: "tre-ranking", storageBucket: "tre-ranking.firebasestorage.app", messagingSenderId: "1008986456536", appId: "1:1008986456536:web:a6e1c735b8a1d07081f2ad" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let quadroPontos = [];
        let postagensGlobal = [];
        const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const dataAtual = new Date();
        let mesAtualStr = `${mesesNomes[dataAtual.getMonth()]} ${dataAtual.getFullYear()}`;

        function getAvatarUrl(nick) { return `https://www.habbo.com.br/habbo-imaging/avatarimage?user=${nick}&action=std&direction=2&head_direction=2&gesture=sml&size=m`; }

        function inicializarDropdown() {
            const menu = document.getElementById('menu-filter-meses');
            const texto = document.getElementById('texto-filter-mes');
            texto.innerText = mesAtualStr;
            menu.innerHTML = '';
            for(let i = 0; i < 12; i++) {
                let d = new Date(dataAtual.getFullYear(), dataAtual.getMonth() - i, 1);
                let nome = `${mesesNomes[d.getMonth()]} ${d.getFullYear()}`;
                menu.innerHTML += `<button onclick="selecionarMes(this)" class="px-5 py-3 text-left hover:bg-white/10 transition-colors text-white/70 hover:text-white border-b border-white/5 w-full cursor-pointer">${nome}</button>`;
            }
        }

        function toggleDropdown() {
            const m = document.getElementById('menu-filter-meses'); const s = document.getElementById('icone-filter-seta');
            m.classList.toggle('opacity-0'); m.classList.toggle('invisible'); m.classList.toggle('translate-y-2'); s.classList.toggle('rotate-180');
        }

        function selecionarMes(el) {
            mesAtualStr = el.innerText;
            document.getElementById('texto-filter-mes').innerText = mesAtualStr;
            toggleDropdown();
            renderizarTabela(); 
        }

        db.collection("configuracoes").doc("quadro_pontos").onSnapshot(doc => {
            if (doc.exists) quadroPontos = doc.data().atividades;
            carregarDados();
        });

        function carregarDados() {
            db.collection("postagens").where("status", "in", ["Aprovado", "Rejeitado"]).onSnapshot(snapshot => {
                postagensGlobal = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if(data.dataJulgamento) {
                        const d = data.dataJulgamento.toDate();
                        data.mesAnoStr = `${mesesNomes[d.getMonth()]} ${d.getFullYear()}`;
                        postagensGlobal.push(data);
                    }
                });
                renderizarTabela();
            });
        }

        function renderizarTabela() {
            const list = document.getElementById('table-body');
            const empty = document.getElementById('empty-state');
            list.innerHTML = '';
            const filtrados = postagensGlobal.filter(p => p.mesAnoStr === mesAtualStr);
            if(filtrados.length === 0) { empty.classList.replace('hidden', 'flex'); return; }
            empty.classList.replace('flex', 'hidden');
            filtrados.sort((a, b) => b.dataJulgamento.toDate() - a.dataJulgamento.toDate());
            filtrados.forEach(data => {
                const dObj = data.dataJulgamento.toDate();
                let dataStr = `${dObj.getDate()}/${dObj.getMonth()+1}/${dObj.getFullYear()}`;
                const config = quadroPontos.find(q => q.nome === data.categoria);
                let pts = data.status === "Aprovado" ? (config ? (config.pontos > 0 ? `+${config.pontos}` : config.pontos) : "??") : "0";
                let cor = data.status === "Aprovado" ? "emerald" : "red";
                list.innerHTML += `<tr class="group border-b border-white/5 hover:bg-white/5 text-white/80 filter-row">
                    <td class="p-4 px-6 flex items-center gap-3 font-bold nick-cell"><img src="${getAvatarUrl(data.nick)}" class="w-8 h-8 rounded-full bg-black/40"> ${data.nick}</td>
                    <td class="p-4 font-semibold text-tre-brand">${data.categoria}</td>
                    <td class="p-4 text-center font-black text-${cor}-400">${pts}</td>
                    <td class="p-4 text-center"><span class="point-badge point-${cor} text-${cor}-400">${data.status}</span></td>
                    <td class="p-4 text-xs font-semibold">${data.julgadoPor || 'Sistema'}${data.motivoRejeicao ? `<br><span class="text-[9px] opacity-40">Motivo: ${data.motivoRejeicao}</span>` : ""}</td>
                    <td class="p-4 text-white/40 text-[10px] font-mono">${dataStr}</td>
                </tr>`;
            });
            filtrarTabela();
        }

        function filtrarTabela() {
            const termo = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.filter-row').forEach(row => {
                const nick = row.querySelector('.nick-cell').innerText.toLowerCase();
                row.style.display = nick.includes(termo) ? '' : 'none';
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            inicializarDropdown();
            gsap.to("#anim-header", { y: 0, opacity: 1, duration: 0.8, ease: "expo.out" });
            gsap.to("#anim-content", { y: 0, opacity: 1, duration: 0.9, ease: "expo.out", delay: 0.2 });
        });
    </script>
</body>
</html>
