<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Interno | Treinadores</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        tre: {
                            // Vermelho escuro e rico para o fundo
                            bgDark: '#2D0A0C',
                            bgDarker: '#170304',
                            // Vermelho vibrante para destaques
                            brand: '#E6192B',
                        },
                        medal: {
                            gold: '#FFD700',
                            silver: '#E3E4E5',
                            bronze: '#CD7F32'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Base do site com gradiente premium vermelho escuro */
        body {
            background: linear-gradient(135deg, #2D0A0C 0%, #170304 100%);
            color: #FFFFFF;
            min-height: 100vh;
            background-attachment: fixed;
        }

        /* Efeito Glassmorphism (Padrão Apple) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-panel:hover {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Animações suaves */
        .interactive {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Brilhos específicos das medalhas para os cards do pódio */
        .glow-gold { box-shadow: 0 0 25px rgba(255, 215, 0, 0.15); border-color: rgba(255, 215, 0, 0.4); }
        .glow-silver { box-shadow: 0 0 25px rgba(227, 228, 229, 0.15); border-color: rgba(227, 228, 229, 0.3); }
        .glow-bronze { box-shadow: 0 0 25px rgba(205, 127, 50, 0.15); border-color: rgba(205, 127, 50, 0.3); }
        
        .glow-gold:hover { box-shadow: 0 0 40px rgba(255, 215, 0, 0.3); transform: translateY(-5px); }
        .glow-silver:hover { box-shadow: 0 0 40px rgba(227, 228, 229, 0.3); transform: translateY(-5px); }
        .glow-bronze:hover { box-shadow: 0 0 40px rgba(205, 127, 50, 0.3); transform: translateY(-5px); }
    </style>
</head>
<body class="antialiased selection:bg-tre-brand selection:text-white pb-20">

    <header class="sticky top-0 z-50 w-full glass-panel border-x-0 border-t-0 rounded-none">
        <div class="container mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-shield-halved text-tre-brand text-xl"></i>
                <span class="font-bold tracking-wider">TREINADORES</span>
            </div>
            
            <nav class="hidden md:flex gap-6 text-sm font-medium text-white/70">
                <a href="#" class="hover:text-white transition-colors">Início</a>
                <a href="#" class="hover:text-white transition-colors">Diário Oficial</a>
                <a href="#" class="hover:text-white transition-colors">Weekly</a>
            </nav>

            <div>
                <a href="admin.html" class="glass-panel interactive px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 hover:text-tre-brand">
                    <i class="fa-solid fa-lock text-xs"></i> Acesso Restrito
                </a>
            </div>
        </div>
    </header>

    <section class="container mx-auto px-6 pt-16 pb-12 text-center flex flex-col items-center">
        <i class="fa-solid fa-trophy text-5xl text-medal-gold mb-4 drop-shadow-[0_0_15px_rgba(255,215,0,0.5)]"></i>
        <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-2">RANKING INTERNO</h1>
        <p class="text-white/60 text-sm tracking-widest uppercase mb-8">Companhia de Treinadores • RCC</p>

        <div class="flex flex-wrap justify-center gap-4">
            <button class="glass-panel interactive px-6 py-3 rounded-xl font-semibold flex items-center gap-2 hover:bg-white/10 hover:border-tre-brand/50">
                <i class="fa-solid fa-medal"></i> Pódio Geral
            </button>
            <button class="glass-panel interactive px-6 py-3 rounded-xl font-semibold flex items-center gap-2 hover:bg-white/10 hover:border-tre-brand/50">
                <i class="fa-solid fa-list-ol"></i> Classificação Completa
            </button>
            <button class="glass-panel interactive px-6 py-3 rounded-xl font-semibold flex items-center gap-2 border-tre-brand/30 text-tre-brand bg-tre-brand/10 hover:bg-tre-brand/20">
                <i class="fa-solid fa-file-shield"></i> Transparência
            </button>
        </div>
    </section>

    <section class="container mx-auto px-6 py-8">
        <div class="flex items-center gap-4 mb-10">
            <h2 class="text-2xl font-bold tracking-tight">RANKING – ABRIL 2026</h2>
            <div class="h-[2px] flex-1 bg-gradient-to-r from-tre-brand/50 to-transparent"></div>
        </div>

        <div class="flex flex-col md:flex-row items-end justify-center gap-6 max-w-4xl mx-auto" id="podium-container">
            </div>
    </section>

    <section class="container mx-auto px-6 py-12">
        <div class="flex items-center gap-4 mb-8">
            <h2 class="text-2xl font-bold tracking-tight">CLASSIFICAÇÃO GERAL</h2>
            <div class="h-[2px] flex-1 bg-gradient-to-r from-tre-brand/50 to-transparent"></div>
        </div>

        <div class="max-w-4xl mx-auto glass-panel rounded-2xl overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-white/10 text-xs uppercase tracking-wider text-white/50 bg-black/20">
                        <th class="p-4 font-semibold text-center w-24">Posição</th>
                        <th class="p-4 font-semibold">Membro</th>
                        <th class="p-4 font-semibold text-right">Pontuação</th>
                    </tr>
                </thead>
                <tbody id="list-container">
                    </tbody>
            </table>
        </div>
    </section>

    <script>
        // 1. DADOS SIMULADOS (No futuro, o Google Sheets vai enviar um array exatamente igual a este)
        const dadosRanking = [
            { posicao: 1, nick: "G4VET4", pontos: 120 },
            { posicao: 2, nick: "-newdiegoma33", pontos: 95 },
            { posicao: 3, nick: "Haqz", pontos: 88 },
            { posicao: 4, nick: "TASIO_Nara", pontos: 75 },
            { posicao: 5, nick: "-Matematico", pontos: 60 },
            { posicao: 6, nick: "dlzn.", pontos: 55 }
        ];

        // 2. FUNÇÃO DA API DO HABBO
        function getAvatarUrl(nick, size = 'l', action = 'std', gesture = 'sml') {
            return `https://www.habbo.com.br/habbo-imaging/avatarimage?user=${nick}&action=${action}&direction=2&head_direction=2&gesture=${gesture}&size=${size}`;
        }

        // 3. RENDERIZAR O PÓDIO
        const podiumContainer = document.getElementById('podium-container');
        
        // Separamos o Top 3
        const top3 = dadosRanking.slice(0, 3);
        
        // Reordenamos para exibir na tela na ordem visual correta: 2º Esquerda, 1º Centro, 3º Direita
        const ordemPodio = [top3[1], top3[0], top3[2]];

        ordemPodio.forEach(membro => {
            if(!membro) return;

            let estilos, altura, glowClass, corTexto;
            
            // Configurações visuais específicas para cada posição
            if (membro.posicao === 1) {
                altura = "h-80 md:h-[22rem] w-full md:w-72 z-10 md:-mt-8"; // Maior destaque
                glowClass = "glow-gold bg-gradient-to-b from-white/10 to-transparent";
                corTexto = "text-medal-gold";
            } else if (membro.posicao === 2) {
                altura = "h-72 w-full md:w-64";
                glowClass = "glow-silver";
                corTexto = "text-medal-silver";
            } else {
                altura = "h-64 w-full md:w-64";
                glowClass = "glow-bronze";
                corTexto = "text-medal-bronze";
            }

            const cardHtml = `
                <div class="glass-panel interactive rounded-3xl ${altura} ${glowClass} flex flex-col items-center justify-between p-6 relative overflow-hidden group">
                    
                    <div class="text-center z-10">
                        <span class="font-black text-xl ${corTexto}">${membro.posicao}º LUGAR</span>
                    </div>

                    <div class="relative w-full flex-1 flex justify-center items-end pb-2">
                        <img src="${getAvatarUrl(membro.nick, 'l', 'std', 'sml')}" alt="${membro.nick}" 
                             class="absolute bottom-0 interactive group-hover:scale-110 drop-shadow-2xl">
                    </div>

                    <div class="text-center z-10 w-full pt-4 border-t border-white/10 mt-auto">
                        <h3 class="text-xl font-bold tracking-tight">${membro.nick}</h3>
                        <p class="text-white/60 font-medium">${membro.pontos} Pts</p>
                    </div>
                </div>
            `;
            podiumContainer.innerHTML += cardHtml;
        });

        // 4. RENDERIZAR A LISTA GERAL (Posição 4 em diante)
        const listContainer = document.getElementById('list-container');
        const restoLista = dadosRanking.slice(3);

        restoLista.forEach(membro => {
            const rowHtml = `
                <tr class="border-b border-white/5 interactive hover:bg-white/5 group">
                    <td class="p-4 text-center font-bold text-white/50 group-hover:text-white transition-colors">
                        ${membro.posicao}º
                    </td>
                    <td class="p-4 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-white/10 border border-white/20 overflow-hidden relative flex-shrink-0">
                            <img src="${getAvatarUrl(membro.nick, 'm', 'wlk', 'std')}" alt="${membro.nick}" 
                                 class="absolute -top-3 left-1/2 -translate-x-1/2">
                        </div>
                        <span class="font-semibold tracking-wide">${membro.nick}</span>
                    </td>
                    <td class="p-4 text-right font-bold text-tre-brand">
                        ${membro.pontos} <span class="text-xs text-white/50 font-normal">Pts</span>
                    </td>
                </tr>
            `;
            listContainer.innerHTML += rowHtml;
        });
    </script>
</body>
</html>
