<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Interno | Treinadores</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tre: {
                            primary: '#9A1115', 
                            glow: '#C11C23',
                            background: '#0A0A0A',
                            surface: '#141414',
                            surfaceBorder: '#262626',
                            textTitle: '#F5F5F7',
                            textMuted: '#A1A1A6',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Fundo base escuro (OLED) */
        body { 
            background-color: #0A0A0A; 
            color: #F5F5F7; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body class="selection:bg-tre-primary selection:text-white antialiased">

    <header class="sticky top-0 z-50 w-full border-b border-tre-surfaceBorder bg-tre-surface/70 backdrop-blur-xl">
        <div class="container mx-auto flex h-16 items-center justify-between px-6">
            <h1 class="text-xl font-semibold tracking-tight text-tre-textTitle">
                Ranking <span class="text-tre-primary">TRE</span>
            </h1>
            <nav>
                <a href="admin.html" class="rounded-full bg-tre-surface px-5 py-2 text-sm font-medium border border-tre-surfaceBorder transition-colors hover:bg-tre-surfaceBorder">
                    Painel Administrativo
                </a>
            </nav>
        </div>
    </header>

    <section class="container mx-auto px-6 py-24 text-center">
        <h2 class="mb-6 text-4xl font-bold tracking-tight md:text-6xl text-tre-textTitle">
            A Elite dos <span class="text-transparent bg-clip-text bg-gradient-to-r from-tre-primary to-tre-glow">Treinadores</span>
        </h2>
        <p class="mx-auto max-w-2xl text-lg text-tre-textMuted">
            Acompanhe o desempenho, as métricas e a classificação geral em tempo real.
        </p>
    </section>

    <main id="conteudo-ranking" class="container mx-auto px-6 pb-24">
        <p class="text-center text-tre-textMuted text-sm">O ranking será carregado aqui...</p>
    </main>

</body>
</html>
