<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking dos Treinadores | Treinadores • RCC</title>
    
    <link rel="icon" type="image/png" href="logotre.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        tre: {
                            brand: '#D31522',
                            brandHover: '#FA1C2A',
                            bgPanel: 'rgba(20, 4, 5, 0.6)',
                            glassNav: 'rgba(30, 5, 6, 0.85)',
                        }
                    },
                    boxShadow: {
                        '3xl': '0 35px 60px -15px rgba(0, 0, 0, 0.6)',
                        'nav': '0 10px 40px -10px rgba(0, 0, 0, 0.8)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at top center, #2B0508 0%, #120203 100%);
            color: #FFFFFF;
            min-height: 100vh;
            background-attachment: fixed;
            font-size: 15px;
        }
        .glass-panel {
            background: theme('colors.tre.bgPanel');
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-panel:hover {
            background: rgba(45, 8, 11, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transform: translateY(-4px);
        }
        .glass-navbar {
            background: theme('colors.tre.glassNav');
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .pedestal-gold { border-top: 2px solid #FFD700; box-shadow: 0 -15px 40px -15px rgba(255, 215, 0, 0.25); }
        .pedestal-silver { border-top: 2px solid #E3E4E5; box-shadow: 0 -15px 40px -15px rgba(227, 228, 229, 0.15); }
        .pedestal-bronze { border-top: 2px solid #CD7F32; box-shadow: 0 -15px 40px -15px rgba(205, 127, 50, 0.15); }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #120203; }
        ::-webkit-scrollbar-thumb { background: #D31522; rounded: 3px; }
    </style>
</head>
<body class="antialiased selection:bg-tre-brand selection:text-white flex flex-col overflow-x-hidden">

    <header class="sticky top-0 z-50 w-full glass-navbar shadow-nav">
        <div class="container mx-auto px-4 md:px-6 h-16 md:h-20 flex items-center justify-between">
            
            <div class="flex items-center gap-6 md:gap-10">
                <a href="#" class="flex items-center hover:opacity-80 transition-opacity">
                    <img src="trelogo.png" alt="Logo" class="h-10 md:h-12 object-contain" onerror="this.src='https://via.placeholder.com/150x50/D31522/FFFFFF?text=LOGO'">
                </a>
                
                <nav class="hidden md:flex gap-6 text-[13px] font-bold uppercase tracking-wider text-white/70 items-center">
                    <a href="#" class="hover:text-tre-brand transition-colors">Início</a>
                    <a href="#" class="hover:text-tre-brand transition-colors">Regras</a>
                </nav>
            </div>

            <div class="flex items-center gap-2 md:gap-4">
                <a href="#" class="bg-tre-brand text-white px-4 md:px-5 py-2 md:py-2.5 rounded-lg md:rounded-xl text-[11px] md:text-sm font-bold shadow-xl border border-red-500/50 hover:bg-tre-brandHover transition-all hover:-translate-y-0.5 flex items-center gap-1.5 md:gap-2">
                    <i class="fa-solid fa-bolt"></i> Postagem de Atividade
                </a>
                <a href="admin.html" class="flex bg-black/40 border border-white/10 px-3 md:px-4 py-2 md:py-2.5 rounded-lg md:rounded-xl text-[11px] md:text-sm font-semibold hover:bg-white/10 hover:text-tre-brand transition-all hover:-translate-y-0.5 items-center gap-1.5 md:gap-2">
                    <i class="fa-solid fa-lock text-xs"></i> Restrito
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 md:px-6">
        <section class="pt-12 md:pt-16 pb-6 md:pb-8 text-center">
            <h1 class="text-3xl sm:text-4xl md:text-6xl font-black tracking-tight mb-3 uppercase drop-shadow-lg">Ranking <span class="text-transparent bg-clip-text bg-gradient-to-r from-tre-brand to-[#FF4B55]">dos Treinadores</span></h1>
            <p class="text-white/50 text-[10px] sm:text-xs md:text-sm font-bold tracking-[0.2em] md:tracking-[0.3em] uppercase">Treinadores • Acompanhamento Mensal</p>
        </section>

        <section class="py-12">
            <div class="flex flex-col md:flex-row items-center md:items-end justify-center gap-6 md:gap-8 max-w-5xl mx-auto mt-20 md:mt-32" id="podium-container"></div>
        </section>

        <section class="py-12 md:py-16">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-[11px] md:text-sm font-black tracking-widest uppercase text-white/30 mb-5 md:mb-6 pl-3 md:pl-4 border-l-2 border-tre-brand">Demais Classificados</h2>
                <div class="glass-panel rounded-2xl md:rounded-3xl overflow-hidden p-1 shadow-3xl">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[500px]">
                            <tbody id="list-container"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="w-full border-t border-white/5 bg-black/40 mt-16 pb-10">
        <div class="container mx-auto px-6 pt-10 text-center text-white/30 grayscale hover:grayscale-0 transition-all duration-700 hover:text-white/60">
            <img src="trelogo.png" alt="Logo TRE" class="h-10 mx-auto object-contain mb-4 opacity-50" onerror="this.style.display='none'">
            <p class="text-xl md:text-2xl font-black tracking-tighter uppercase mb-1">Companhia dos Treinadores</p>
            <p class="text-[10px] md:text-xs font-medium uppercase tracking-[0.3em]">RCC • Todos os direitos reservados</p>
            
            <div class="mt-6 pt-5 border-t border-white/5 inline-block">
                <p class="text-[11px] md:text-xs font-semibold tracking-widest text-white/40">
                    <span class="font-mono text-tre-brand font-bold text-sm">&lt;/&gt;</span> por <span class="text-white/80">G4VET4</span> &bull; &copy; 2026 Companhia dos Treinadores
                </p>
            </div>
        </div>
    </footer>

    <script>
        const dadosRanking = [
            { posicao: 1, nick: "G4VET4", pontos: 185 },
            { posicao: 2, nick: "benjlfbaby", pontos: 150 },
            { posicao: 3, nick: "BeGomes94.", pontos: 130 },
            { posicao: 4, nick: "Granno", pontos: 110 },
            { posicao: 5, nick: "@Allyzon", pontos: 95 },
            { posicao: 6, nick: "andrej0128s", pontos: 80 },
            { posicao: 7, nick: "Evange", pontos: 75 },
            { posicao: 8, nick: "AGUA.1598", pontos: 60 }
        ];

        function getAvatarUrl(nick, size = 'l', action = 'std', gesture = 'sml') {
            return `https://www.habbo.com.br/habbo-imaging/avatarimage?user=${nick}&action=${action}&direction=2&head_direction=2&gesture=${gesture}&size=${size}`;
        }

        const podiumContainer = document.getElementById('podium-container');
        const ordemPodio = [dadosRanking[1], dadosRanking[0], dadosRanking[2]];

        ordemPodio.forEach(membro => {
            if(!membro) return;

            let orderClass = membro.posicao === 1 ? "order-1 md:order-2 mt-20 md:mt-0" : membro.posicao === 2 ? "order-2 md:order-1 mt-20 md:mt-0" : "order-3 md:order-3 mt-20 md:mt-0";
            let alturaPedestal = membro.posicao === 1 ? "h-60 md:h-72 z-20" : membro.posicao === 2 ? "h-48 md:h-60 z-10" : "h-44 md:h-56 z-10";
            let widthClass = membro.posicao === 1 ? "w-64 md:w-[22rem]" : "w-60 md:w-[19rem]";
            let corMedalha = membro.posicao === 1 ? "text-[#FFD700]" : membro.posicao === 2 ? "text-[#E3E4E5]" : "text-[#CD7F32]";
            let classePedestal = membro.posicao === 1 ? "pedestal-gold bg-gradient-to-b from-[#4A3B00]/30 to-transparent" : membro.posicao === 2 ? "pedestal-silver bg-gradient-to-b from-[#2A2B2D]/40 to-transparent" : "pedestal-bronze bg-gradient-to-b from-[#4A2D10]/30 to-transparent";
            let nickSize = membro.posicao === 1 ? "text-2xl md:text-3xl" : "text-xl md:text-2xl";

            podiumContainer.innerHTML += `
                <div class="relative ${widthClass} flex flex-col items-center group ${orderClass}">
                    <div class="absolute bottom-[calc(100%-2rem)] left-1/2 -translate-x-1/2 z-30 pointer-events-none transition-all duration-500 ease-out group-hover:-translate-y-5 group-hover:scale-110 drop-shadow-[0_15px_20px_rgba(0,0,0,0.6)] group-hover:drop-shadow-[0_25px_30px_rgba(0,0,0,0.8)]">
                        <img src="${getAvatarUrl(membro.nick, 'l', 'std', 'sml')}" alt="${membro.nick}" class="w-full h-full object-contain">
                    </div>
                    <div class="glass-panel w-full rounded-[1.5rem] md:rounded-[2rem] ${alturaPedestal} ${classePedestal} flex flex-col items-center p-5 md:p-6 relative">
                        <div class="mt-8 mb-auto text-center w-full">
                            <span class="font-black text-lg md:text-xl tracking-[0.2em] whitespace-nowrap ${corMedalha} drop-shadow-md">${membro.posicao}º LUGAR</span>
                        </div>
                        <div class="text-center w-full mt-auto flex flex-col items-center gap-4 md:gap-5">
                            <h3 class="${nickSize} font-black tracking-tight text-white whitespace-nowrap group-hover:text-tre-brand transition-colors">${membro.nick}</h3>
                            <div class="inline-flex items-center justify-center bg-black/40 border border-white/5 rounded-xl md:rounded-2xl px-5 md:px-6 py-1.5 md:py-2 shadow-inner">
                                <span class="text-xl md:text-2xl font-black">${membro.pontos}</span> <span class="text-[11px] md:text-sm font-semibold text-white/40 ml-1 md:ml-1.5 uppercase">Pts</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        const listContainer = document.getElementById('list-container');
        
        dadosRanking.slice(3).forEach(membro => {
            listContainer.innerHTML += `
                <tr class="group border-b border-white/5 hover:bg-white/5 transition-colors cursor-default">
                    <td class="p-4 md:p-5 md:px-8 text-center font-black text-lg md:text-xl text-white/20 group-hover:text-tre-brand transition-colors w-16 md:w-24">
                        ${membro.posicao}º
                    </td>
                    <td class="p-4 md:p-5 flex items-center gap-4 md:gap-6">
                        <div class="w-12 h-12 md:w-14 md:h-14 rounded-full bg-black/40 border-2 border-white/10 overflow-hidden relative flex-shrink-0 group-hover:border-tre-brand transition-colors shadow-lg">
                            <img src="${getAvatarUrl(membro.nick, 'm', 'wlk', 'std')}" alt="${membro.nick}" class="absolute -top-3 left-1/2 -translate-x-1/2 transition-transform duration-500 group-hover:scale-125">
                        </div>
                        <span class="font-bold text-base md:text-lg tracking-wide transition-transform duration-300 group-hover:translate-x-2 text-white/90 group-hover:text-white">${membro.nick}</span>
                    </td>
                    <td class="p-4 md:p-5 md:px-8 text-right w-32 md:w-40">
                        <span class="font-black text-xl md:text-2xl text-white transition-colors group-hover:text-tre-brand">${membro.pontos}</span> 
                        <span class="text-[11px] md:text-xs font-semibold text-white/40 uppercase ml-1">Pts</span>
                    </td>
                </tr>
            `;
        });
    </script>
</body>
</html>
