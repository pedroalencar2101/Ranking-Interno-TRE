<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Interno | Treinadores</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        tre: {
                            bgDark: '#1A0506', // Fundo ainda mais profundo para dar contraste ao vidro
                            brand: '#D31522', // Vermelho forte e vivo
                            brandHover: '#FA1C2A',
                        },
                        medal: {
                            gold: '#FFD700',
                            silver: '#E3E4E5',
                            bronze: '#CD7F32'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at top center, #3A0A0E 0%, #1A0506 100%);
            color: #FFFFFF;
            min-height: 100vh;
            background-attachment: fixed;
        }

        /* Vidro mais limpo e polido */
        .glass-panel {
            background: rgba(20, 5, 6, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-panel:hover {
            background: rgba(40, 10, 12, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
        }

        /* Efeitos de reatividade da interface */
        .btn-reactive {
            transition: all 0.3s ease;
        }
        .btn-reactive:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 20px -10px rgba(211, 21, 34, 0.5);
        }

        /* Brilhos dos pedestais */
        .pedestal-gold { border-top: 2px solid #FFD700; box-shadow: 0 -10px 30px -10px rgba(255, 215, 0, 0.3); }
        .pedestal-silver { border-top: 2px solid #E3E4E5; box-shadow: 0 -10px 30px -10px rgba(227, 228, 229, 0.2); }
        .pedestal-bronze { border-top: 2px solid #CD7F32; box-shadow: 0 -10px 30px -10px rgba(205, 127, 50, 0.2); }
        
        /* Animação do Avatar (O site vivo) */
        .avatar-hover {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }
        .group:hover .avatar-hover {
            transform: translateY(-15px) scale(1.15);
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.7)) brightness(1.1);
        }
    </style>
</head>
<body class="antialiased selection:bg-tre-brand selection:text-white pb-20">

    <header class="sticky top-0 z-50 w-full glass-panel !rounded-none !transform-none !border-x-0 !border-t-0">
        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
            <a href="#" class="flex items-center btn-reactive">
                <img src="trelogo.png" alt="Logo Treinadores" class="h-12 object-contain" onerror="this.src='https://via.placeholder.com/150x50/1A0506/FFFFFF?text=LOGO+TRE'">
            </a>
            
            <nav class="hidden lg:flex gap-8 text-sm font-medium text-white/80 items-center">
                <a href="#" class="hover:text-white hover:text-tre-brand transition-colors">Início</a>
                <a href="#" class="hover:text-white transition-colors">Sobre (Regras)</a>
            </nav>

            <div class="flex items-center gap-4">
                <a href="#" class="btn-reactive bg-tre-brand text-white px-5 py-2.5 rounded-xl text-sm font-bold tracking-wide shadow-lg border border-red-500/50 hover:bg-tre-brandHover flex items-center gap-2">
                    <i class="fa-solid fa-bolt"></i> Postagem de Atividade
                </a>
                <a href="admin.html" class="hidden sm:flex glass-panel !transform-none px-4 py-2.5 rounded-xl text-sm font-semibold items-center gap-2 hover:bg-white/10 hover:text-tre-brand">
                    <i class="fa-solid fa-lock text-xs"></i> Restrito
                </a>
            </div>
        </div>
    </header>

    <section class="container mx-auto px-6 pt-16 pb-8 text-center">
        <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-3">RANKING <span class="text-transparent bg-clip-text bg-gradient-to-r from-tre-brand to-red-400">OFICIAL</span></h1>
        <p class="text-white/60 text-sm tracking-widest uppercase mb-4">Corpo de Treinadores • Acompanhamento Mensal</p>
    </section>

    <section class="container mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row items-end justify-center gap-8 md:gap-4 max-w-5xl mx-auto mt-20" id="podium-container">
            </div>
    </section>

    <section class="container mx-auto px-6 py-16">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-xl font-bold tracking-widest uppercase text-white/40 mb-6 pl-2">Demais Classificados</h2>
            
            <div class="glass-panel rounded-3xl overflow-hidden p-2">
                <table class="w-full text-left border-collapse">
                    <tbody id="list-container">
                        </tbody>
                </table>
            </div>
        </div>
    </section>

    <script>
        // Dados Estruturais (G4VET4 no topo do corpo executivo/militar)
        const dadosRanking = [
            { posicao: 1, nick: "G4VET4", pontos: 120, cargo: "Supervisor" },
            { posicao: 2, nick: "-newdiegoma33", pontos: 95, cargo: "Treinador" },
            { posicao: 3, nick: "Haqz", pontos: 88, cargo: "Treinador" },
            { posicao: 4, nick: "TASIO_Nara", pontos: 75, cargo: "Treinador" },
            { posicao: 5, nick: "-Matematico", pontos: 60, cargo: "Treinador" },
            { posicao: 6, nick: "dlzn.", pontos: 55, cargo: "Treinador" }
        ];

        function getAvatarUrl(nick, size = 'l', action = 'std', gesture = 'sml') {
            return `https://www.habbo.com.br/habbo-imaging/avatarimage?user=${nick}&action=${action}&direction=2&head_direction=2&gesture=${gesture}&size=${size}`;
        }

        // RENDERIZAR O PÓDIO (SEM OVERFLOW-HIDDEN, AVATAR LIVRE)
        const podiumContainer = document.getElementById('podium-container');
        const top3 = dadosRanking.slice(0, 3);
        const ordemPodio = [top3[1], top3[0], top3[2]]; // 2º, 1º, 3º

        ordemPodio.forEach(membro => {
            if(!membro) return;

            let alturaPedestal, corMedalha, classePedestal;
            
            if (membro.posicao === 1) {
                alturaPedestal = "h-56 md:h-64 z-20";
                corMedalha = "text-medal-gold";
                classePedestal = "pedestal-gold bg-gradient-to-b from-yellow-900/20 to-transparent";
            } else if (membro.posicao === 2) {
                alturaPedestal = "h-48 md:h-52 z-10";
                corMedalha = "text-medal-silver";
                classePedestal = "pedestal-silver bg-gradient-to-b from-gray-700/20 to-transparent";
            } else {
                alturaPedestal = "h-44 md:h-48 z-10";
                corMedalha = "text-medal-bronze";
                classePedestal = "pedestal-bronze bg-gradient-to-b from-orange-900/20 to-transparent";
            }

            // Repare na classe 'group' no container pai, e a ausência do 'overflow-hidden'
            const cardHtml = `
                <div class="relative w-full md:w-72 flex flex-col items-center group mt-20 md:mt-0">
                    
                    <div class="absolute bottom-[calc(100%-3rem)] z-30 pointer-events-none w-full flex justify-center">
                        <img src="${getAvatarUrl(membro.nick, 'l', 'std', 'sml')}" alt="${membro.nick}" class="avatar-hover">
                    </div>

                    <div class="glass-panel w-full rounded-3xl ${alturaPedestal} ${classePedestal} flex flex-col items-center justify-end p-6 relative">
                        
                        <div class="absolute -top-4 bg-tre-bgDark border border-white/10 px-4 py-1 rounded-full shadow-lg">
                            <span class="font-black text-sm ${corMedalha}">${membro.posicao}º LUGAR</span>
                        </div>

                        <div class="text-center w-full mt-auto">
                            <h3 class="text-2xl font-bold tracking-tight text-white group-hover:text-tre-brand transition-colors">${membro.nick}</h3>
                            <p class="text-white/40 text-xs font-semibold uppercase tracking-wider mb-2">${membro.cargo}</p>
                            <div class="inline-block bg-white/5 border border-white/10 rounded-lg px-4 py-1.5 mt-2">
                                <span class="text-lg font-black">${membro.pontos}</span> <span class="text-xs text-white/50">Pts</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            podiumContainer.innerHTML += cardHtml;
        });

        // RENDERIZAR A LISTA GERAL (Com efeitos Hover)
        const listContainer = document.getElementById('list-container');
        const restoLista = dadosRanking.slice(3);

        restoLista.forEach(membro => {
            const rowHtml = `
                <tr class="group border-b border-white/5 hover:bg-white/5 transition-all duration-300 cursor-default">
                    <td class="p-4 md:px-8 text-center font-black text-xl text-white/30 group-hover:text-tre-brand transition-colors w-16 md:w-24">
                        ${membro.posicao}º
                    </td>
                    <td class="p-4 flex items-center gap-4 md:gap-6">
                        <div class="w-12 h-12 rounded-full bg-tre-bgDark border border-white/10 overflow-hidden relative flex-shrink-0 group-hover:border-tre-brand/50 transition-colors">
                            <img src="${getAvatarUrl(membro.nick, 'm', 'wlk', 'std')}" alt="${membro.nick}" 
                                 class="absolute -top-2 left-1/2 -translate-x-1/2 group-hover:scale-110 transition-transform duration-300">
                        </div>
                        <div class="flex flex-col">
                            <span class="font-bold text-lg tracking-wide group-hover:translate-x-2 transition-transform duration-300">${membro.nick}</span>
                            <span class="text-xs text-white/40 font-medium">${membro.cargo}</span>
                        </div>
                    </td>
                    <td class="p-4 md:px-8 text-right w-32">
                        <span class="font-bold text-xl text-white group-hover:text-tre-brand transition-colors">${membro.pontos}</span> 
                        <span class="text-sm text-white/40">Pts</span>
                    </td>
                </tr>
            `;
            listContainer.innerHTML += rowHtml;
        });
    </script>
</body>
</html>
